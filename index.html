
<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Pecahan</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#87CEEB,#dff6ff);
}

#gameArea{
    width:100vw;
    height:100vh;
    position:relative;
}

#header{
    position:absolute;
    top:10px;
    left:10px;
    z-index:100;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#message{
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
    font-size:36px;
    font-weight:bold;
    color:red;
    z-index:100;
}

.fruit{
    width:90px;
    height:90px;
    border-radius:50%;
    position:absolute;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    user-select:none;
}

.apple{
    background:#e63946;
}

.orange{
    background:#ff9f1c;
}

#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="gameArea">

<div id="header">
<h2>🥷 Ninja Pecahan</h2>
<div>Skor: <span id="score">0</span></div>
<div>Masa: <span id="time">60</span>s</div>
</div>

<div id="message"></div>

<div id="startScreen">
<h1>🥷 Ninja Pecahan</h1>
<p>Potong buah yang mempunyai pecahan lebih besar!</p>
<button onclick="startGame()">MULA</button>
</div>

</div>

<script>

let score=0;
let timeLeft=60;
let gameInterval;
let timerInterval;

const fractions=[
["1/2","1/4"],
["3/4","2/4"],
["2/3","1/3"],
["3/5","2/5"],
["4/6","2/6"],
["5/8","3/8"],
["2/4","3/4"],
["1/6","5/6"],
["3/7","6/7"],
["2/8","7/8"]
];

function fractionValue(frac){
let parts=frac.split("/");
return Number(parts[0])/Number(parts[1]);
}

function startGame(){

document.getElementById("startScreen").style.display="none";

timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("time").innerText=timeLeft;

if(timeLeft<=0){
endGame();
}
},1000);

gameInterval=setInterval(createQuestion,2000);

createQuestion();
}

function createQuestion(){

let pair=fractions[Math.floor(Math.random()*fractions.length)];

let f1=pair[0];
let f2=pair[1];

let correct=
fractionValue(f1)>fractionValue(f2)
?f1
:f2;

createFruit(
f1,
Math.random()*40+10,
correct===f1
);

createFruit(
f2,
Math.random()*40+50,
correct===f2
);
}

function createFruit(text,left,isCorrect){

let fruit=document.createElement("div");

fruit.classList.add("fruit");

fruit.classList.add(
Math.random()>0.5
?"apple"
:"orange"
);

fruit.innerHTML=text;

fruit.style.left=left+"%";
fruit.style.top="-100px";

document.getElementById("gameArea").appendChild(fruit);

let pos=-100;

let fall=setInterval(()=>{

pos+=4;

fruit.style.top=pos+"px";

if(pos>window.innerHeight){
clearInterval(fall);
fruit.remove();
}

},20);

fruit.onclick=function(){

clearInterval(fall);

fruit.remove();

if(isCorrect){

score+=10;

showMessage("✅ Hebat!");

}else{

score-=5;

showMessage("❌ Cuba Lagi!");
}

document.getElementById("score").innerText=score;
};
}

function showMessage(text){

let msg=document.getElementById("message");

msg.innerText=text;

setTimeout(()=>{
msg.innerText="";
},1000);
}

function endGame(){

clearInterval(timerInterval);
clearInterval(gameInterval);

document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:Arial;
background:#f5f5f5;
">
<h1>🥷 Tamat Permainan</h1>
<h2>Skor Akhir: ${score}</h2>
<button onclick="location.reload()">
Main Semula
</button>
</div>
`;
}

</script>

</body>
</html>
